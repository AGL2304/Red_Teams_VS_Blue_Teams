# nginx.conf — Reverse proxy WAF devant Juice Shop
# Démarrage : docker-compose -f docker-compose-waf.yml up -d

events { worker_connections 1024; }

http {
    # ── Rate limiting ──────────────────────────────────────────────────────────
    limit_req_zone $binary_remote_addr zone=api:10m rate=30r/m;
    limit_req_zone $binary_remote_addr zone=login:10m rate=5r/m;
    limit_req_zone $binary_remote_addr zone=ftp:10m rate=10r/m;

    # ── Logging structuré (ingéré par ELK) ────────────────────────────────────
    log_format waf_json escape=json
        '{'
        '"time":"$time_iso8601",'
        '"remote_addr":"$remote_addr",'
        '"method":"$request_method",'
        '"uri":"$request_uri",'
        '"status":"$status",'
        '"body_bytes":"$body_bytes_sent",'
        '"http_referer":"$http_referer",'
        '"http_user_agent":"$http_user_agent",'
        '"modsec_score":"$upstream_http_x_modsec_score"'
        '}';

    access_log /var/log/nginx/access.log waf_json;
    error_log  /var/log/nginx/error.log warn;

    server {
        listen 8081;
        server_name _;

        # ── Headers de sécurité globaux ────────────────────────────────────────
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self'; object-src 'none';" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

        # Masquer la version serveur
        server_tokens off;

        # ── Blocage préventif patterns dangereux dans URI ──────────────────────
        # Null byte (FTP bypass VULN-04)
        if ($request_uri ~* "%00|%2500|%252500") {
            return 400 '{"error":"Bad Request"}';
        }

        # Path traversal
        if ($request_uri ~* "\.\./|\.\.\\") {
            return 403 '{"error":"Forbidden"}';
        }

        # ── Endpoint /rest/products/search — protection SQLi (VULN-01) ─────────
        location ~* ^/rest/products/search {
            limit_req zone=api burst=10 nodelay;

            # Bloquer patterns SQLi dans le paramètre q
            if ($arg_q ~* "(union|select|insert|update|delete|drop|sqlite_master|information_schema)") {
                return 403 '{"error":"Forbidden - WAF-001: SQLi pattern detected"}';
            }
            if ($arg_q ~* "('|--|;|/\*|\*/|xp_|exec\s*\()") {
                return 403 '{"error":"Forbidden - WAF-001: SQLi characters detected"}';
            }
            # Limiter longueur paramètre q
            if ($arg_q ~* ".{101,}") {
                return 400 '{"error":"Bad Request - Query too long"}';
            }

            proxy_pass http://juice-shop:3000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # ── Endpoint /rest/user/login — protection SQLi bypass (VULN-02) ───────
        location = /rest/user/login {
            limit_req zone=login burst=3 nodelay;
            limit_req_status 429;

            # Bloquer SQLi dans le body JSON (inspection basique)
            # (ModSecurity gère l'inspection du body en profondeur)
            proxy_pass http://juice-shop:3000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # ── Endpoint /ftp/ — blocage null byte + rate limit (VULN-04) ──────────
        location /ftp/ {
            limit_req zone=ftp burst=5 nodelay;

            # Bloquer les encodages de null byte
            if ($uri ~* "(%00|%2500|%25)") {
                return 400 '{"error":"Bad Request - WAF-003: Null byte detected"}';
            }

            # Autoriser seulement .md et .pdf (renforcement)
            if ($uri !~* "\.(md|pdf)$") {
                return 403 '{"error":"Forbidden - Only .md and .pdf files are allowed"}';
            }

            proxy_pass http://juice-shop:3000;
            proxy_set_header Host $host;
        }

        # ── Endpoint /rest/products/*/reviews — blocage XSS (VULN-05) ─────────
        location ~* ^/rest/products/[0-9]+/reviews {
            limit_req zone=api burst=5 nodelay;

            # Les bloquages XSS dans le body sont gérés par ModSecurity
            # Ici : bloquer les requêtes PUT sans token (non authentifiées)
            if ($request_method = PUT) {
                set $auth_header $http_authorization;
                if ($auth_header = "") {
                    return 401 '{"error":"Unauthorized"}';
                }
            }

            proxy_pass http://juice-shop:3000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # ── Endpoint /api/Users — rate limit IDOR (VULN-03) ───────────────────
        location ~* ^/api/Users {
            limit_req zone=api burst=20 nodelay;

            proxy_pass http://juice-shop:3000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;

            # Log enrichi pour détection SIEM
            access_log /var/log/nginx/idor_attempts.log waf_json;
        }

        # ── Route par défaut ───────────────────────────────────────────────────
        location / {
            proxy_pass http://juice-shop:3000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
    }
}
