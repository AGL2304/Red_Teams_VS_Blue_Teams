# nginx_waf.conf — Reverse proxy WAF devant Juice Shop
# CORRECTIONS :
#   FIX-1 : listen 8080 (port interne du container Docker, non 8081)
#   FIX-2 : apostrophe seule ne bloque plus — uniquement '-- et UNION/SELECT
#   FIX-3 : FTP null byte vérifié sur $request_uri (brut) ET $uri (normalisé)
#   FIX-4 : reviews sans limit_req → évite faux positif après tests XSS
#   FIX-5 : rate limiting login burst=1 → 429 garanti dès la 3e requête
#   FIX-6 : add_header CSP dans chaque location (nginx: location override server)

events { worker_connections 1024; }

http {
    # ── Rate limiting ────────────────────────────────────────────────────────
    limit_req_zone $binary_remote_addr zone=api:10m    rate=30r/m;
    # FIX-5 : login — rate=5r/m burst=1 → 3 requêtes passent, 4e = 429
    limit_req_zone $binary_remote_addr zone=login:10m  rate=5r/m;
    limit_req_zone $binary_remote_addr zone=ftp:10m    rate=10r/m;

    # ── Logging structuré JSON pour ELK ─────────────────────────────────────
    log_format waf_json escape=json
        '{'
        '"time":"$time_iso8601",'
        '"remote_addr":"$remote_addr",'
        '"method":"$request_method",'
        '"uri":"$request_uri",'
        '"status":"$status",'
        '"body_bytes":"$body_bytes_sent",'
        '"http_referer":"$http_referer",'
        '"http_user_agent":"$http_user_agent",'
        '"modsec_score":"$upstream_http_x_modsec_score"'
        '}';

    access_log /var/log/nginx/access.log waf_json;
    error_log  /var/log/nginx/error.log warn;

    server {
        # FIX-1 : port interne du container = 8080 (docker-compose mappe 8081:8080)
        listen 8080;
        server_name _;

        server_tokens off;

        # ── Blocage global URI — null byte et path traversal ─────────────────
        # FIX-3 : vérification sur $request_uri (URI brute, non normalisée)
        if ($request_uri ~* "(%00|%2500|%252500)") {
            return 400 '{"error":"Bad Request - Null byte detected"}';
        }
        if ($request_uri ~* "(\.\./|\.\.\\|%2e%2e)") {
            return 403 '{"error":"Forbidden - Path traversal"}';
        }

        # ── /rest/products/search — protection SQLi (VULN-01) ────────────────
        location ~* ^/rest/products/search {
            limit_req zone=api burst=20 nodelay;

            # FIX-2 : ne bloquer que les combinaisons SQLi réelles
            # Apostrophe seule (ex: mother's) → autorisée
            # UNION/SELECT, --, xp_ → bloqués
            if ($arg_q ~* "(?i)(union[\s+]select|union%20select|union%09select)") {
                return 403 '{"error":"Forbidden - WAF-001: SQLi UNION detected"}';
            }
            if ($arg_q ~* "(?i)(sqlite_master|information_schema|xp_cmdshell|randomblob)") {
                return 403 '{"error":"Forbidden - WAF-001: SQLi keyword detected"}';
            }
            if ($arg_q ~* "('--|'\s*or\s+'|'\s*and\s+'|'\s*=\s*'|\)\s*--|\)\s*;)") {
                return 403 '{"error":"Forbidden - WAF-001: SQLi operator detected"}';
            }
            if ($arg_q ~* ".{201,}") {
                return 400 '{"error":"Bad Request - Query too long"}';
            }

            proxy_pass http://juice-shop:3000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;

            # FIX-6 : headers de sécurité dans chaque location
            add_header X-Frame-Options "SAMEORIGIN" always;
            add_header X-Content-Type-Options "nosniff" always;
            add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; object-src 'none';" always;
            add_header X-XSS-Protection "1; mode=block" always;
            add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        }

        # ── /rest/user/login — protection SQLi bypass + rate limit (VULN-02) ─
        location = /rest/user/login {
            # FIX-5 : burst=1 nodelay → 3e requête déjà bloquée (429)
            limit_req zone=login burst=1 nodelay;
            limit_req_status 429;

            proxy_pass http://juice-shop:3000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;

            add_header X-Frame-Options "SAMEORIGIN" always;
            add_header X-Content-Type-Options "nosniff" always;
            add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; object-src 'none';" always;
        }

        # ── /ftp/ — blocage null byte + extension whitelist (VULN-04) ─────────
        location /ftp/ {
            limit_req zone=ftp burst=5 nodelay;

            # FIX-3 : double vérification $request_uri (brut) ET $uri (normalisé)
            # $request_uri : contient %2500 tel quel avant décodage nginx
            if ($request_uri ~* "(%00|%2500|%25[0-9a-fA-F]{2}|%252[0-9a-fA-F])") {
                return 400 '{"error":"Bad Request - WAF-003: Null byte detected"}';
            }
            # $uri : après normalisation nginx (%2500 → %00 ou caractère nul)
            if ($uri ~* "(%00|%25)") {
                return 400 '{"error":"Bad Request - WAF-003: Encoded null byte detected"}';
            }
            # Autoriser seulement les extensions .md et .pdf
            if ($uri !~* "\.(md|pdf)$") {
                return 403 '{"error":"Forbidden - Only .md and .pdf files are allowed"}';
            }

            proxy_pass http://juice-shop:3000;
            proxy_set_header Host $host;

            add_header X-Frame-Options "SAMEORIGIN" always;
            add_header X-Content-Type-Options "nosniff" always;
            add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; object-src 'none';" always;
        }

        # ── /rest/products/*/reviews — protection XSS (VULN-05) ──────────────
        location ~* ^/rest/products/[0-9]+/reviews {
            # FIX-4 : suppression du limit_req ici
            # Les 2 tests XSS consommaient le burst avant la review légitime
            # ModSecurity WAF-004 suffit à bloquer les payloads malveillants

            if ($request_method = PUT) {
                set $auth_header $http_authorization;
                if ($auth_header = "") {
                    return 401 '{"error":"Unauthorized - token required"}';
                }
            }

            proxy_pass http://juice-shop:3000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;

            add_header X-Frame-Options "SAMEORIGIN" always;
            add_header X-Content-Type-Options "nosniff" always;
            add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; object-src 'none';" always;
        }

        # ── /api/Users — rate limit + logging IDOR (VULN-03) ─────────────────
        location ~* ^/api/Users {
            limit_req zone=api burst=20 nodelay;

            proxy_pass http://juice-shop:3000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;

            access_log /var/log/nginx/idor_attempts.log waf_json;

            add_header X-Frame-Options "SAMEORIGIN" always;
            add_header X-Content-Type-Options "nosniff" always;
            add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; object-src 'none';" always;
        }

        # ── Route par défaut ─────────────────────────────────────────────────
        location / {
            proxy_pass http://juice-shop:3000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

            # FIX-6 : headers aussi dans la location par défaut
            add_header X-Frame-Options "SAMEORIGIN" always;
            add_header X-Content-Type-Options "nosniff" always;
            add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; object-src 'none';" always;
            add_header X-XSS-Protection "1; mode=block" always;
            add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        }
    }
}
