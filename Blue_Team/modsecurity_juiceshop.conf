# modsecurity_juiceshop.conf
# Règles ModSecurity custom — OWASP Juice Shop Blue Team
# Placer dans /etc/modsecurity/custom_juiceshop.conf
# Inclure dans modsecurity.conf : Include /etc/modsecurity/custom_juiceshop.conf

SecRuleEngine On
SecRequestBodyAccess On
SecResponseBodyAccess Off
SecRequestBodyLimit 1048576

# ── WAF-001 : SQLi UNION sur /rest/products/search ────────────────────────────
SecRule REQUEST_URI "@beginsWith /rest/products/search" \
    "chain,id:1001,phase:2,deny,status:403,\
    log,auditlog,\
    msg:'WAF-001 SQLi UNION detected on search',\
    tag:'attack-sqli',tag:'OWASP_CRS/WEB_ATTACK/SQL_INJECTION'"
    SecRule ARGS:q "@rx (?i)(\bunion\b.{0,30}\bselect\b|sqlite_master|information_schema|'\s*--|\)\s*--|xp_cmdshell)"

# ── WAF-002 : SQLi Login Bypass (apostrophe + commentaire) ────────────────────
SecRule REQUEST_URI "@beginsWith /rest/user/login" \
    "chain,id:1002,phase:2,deny,status:403,\
    log,auditlog,\
    msg:'WAF-002 SQLi login bypass detected',\
    tag:'attack-sqli'"
    SecRule REQUEST_BODY "@rx (?i)((['\"])\s*--|\bor\b\s+['\"]?\d+['\"]?\s*=\s*['\"]?\d+|'\s*or\s*'[^']*'\s*=\s*')"

# ── WAF-003 : Null Byte Bypass sur /ftp/ ──────────────────────────────────────
SecRule REQUEST_URI "@beginsWith /ftp/" \
    "chain,id:1003,phase:1,deny,status:400,\
    log,auditlog,\
    msg:'WAF-003 Null byte detected in FTP path',\
    tag:'attack-lfi'"
    SecRule REQUEST_URI "@rx (%00|%2500|%25[0-9a-fA-F]{2}00)"

# ── WAF-004 : XSS Stocké sur les reviews ──────────────────────────────────────
SecRule REQUEST_URI "@rx ^/rest/products/[0-9]+/reviews$" \
    "chain,id:1004,phase:2,deny,status:403,\
    log,auditlog,\
    msg:'WAF-004 Stored XSS attempt in reviews',\
    tag:'attack-xss'"
    SecRule REQUEST_BODY "@rx (?i)(<script[\s>]|javascript\s*:|on\w+\s*=|<iframe|<img[^>]+onerror|fetch\s*\(|eval\s*\()"

# ── WAF-005 : Time-based SQLi (RANDOMBLOB, sleep) ─────────────────────────────
SecRule ARGS "@rx (?i)(RANDOMBLOB|sqlite_version|sleep\s*\(|waitfor\s+delay|benchmark\s*\()" \
    "id:1005,phase:2,deny,status:403,\
    log,auditlog,\
    msg:'WAF-005 Time-based SQLi detected',\
    tag:'attack-sqli'"

# ── WAF-006 : Path Traversal général ──────────────────────────────────────────
SecRule REQUEST_URI "@rx (\.\./|\.\.\\|%2e%2e)" \
    "id:1006,phase:1,deny,status:403,\
    log,auditlog,\
    msg:'WAF-006 Path traversal attempt',\
    tag:'attack-lfi'"

# ── WAF-007 : Brute force login (via anomaly score) ───────────────────────────
# Combiné avec le rate limiting Nginx — log uniquement
SecRule REQUEST_URI "@beginsWith /rest/user/login" \
    "id:1007,phase:5,pass,\
    log,auditlog,\
    msg:'WAF-007 Login attempt logged for SIEM',\
    tag:'auth-attempt'"

# ── WAF-008 : Accès massif IDOR (détection comportementale) ───────────────────
# Log chaque accès /api/Users pour corrélation SIEM
SecRule REQUEST_URI "@rx ^/api/Users/[0-9]+" \
    "id:1008,phase:1,pass,\
    log,auditlog,\
    msg:'WAF-008 User profile access logged',\
    tag:'idor-monitor'"
