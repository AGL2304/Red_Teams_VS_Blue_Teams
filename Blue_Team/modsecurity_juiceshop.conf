# WAF-001 — SQLi UNION sur search (GET uniquement, paramètre q)
SecRule ARGS:q "@rx (?i)(union[\s\+]+select|sqlite_master|''\))" \
    "id:1001,phase:2,deny,status:403,log,msg:'SQLi UNION search'"

# WAF-002 — SQLi login bypass (body JSON, email uniquement)
SecRule REQUEST_BODY "@rx (?i)(\"email\"\s*:\s*\"[^\"]*'--)" \
    "id:1002,phase:2,deny,status:403,log,msg:'SQLi login bypass'"

# WAF-003 — FTP null byte double encodé
SecRule REQUEST_URI "@rx (?i)/ftp/.*%2500" \
    "id:1003,phase:1,deny,status:400,log,msg:'FTP null byte bypass'"

# WAF-004 — XSS dans reviews (balises script/event handlers)
# Cibler UNIQUEMENT le champ message, pas toute la review
SecRule REQUEST_BODY "@rx (?i)<script[\s>]|javascript:|onerror\s*=|onload\s*=" \
    "id:1004,phase:2,deny,status:403,log,msg:'XSS stored review',\
    chain"
    SecRule REQUEST_URI "@rx /reviews$"

# WAF-005 — SQLi RANDOMBLOB time-based
SecRule ARGS "@rx (?i)(randomblob|sleep\s*\(|benchmark\s*\()" \
    "id:1005,phase:2,deny,status:403,log,msg:'SQLi time-based'"
