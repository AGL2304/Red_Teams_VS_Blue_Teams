# modsecurity_juiceshop.conf — Règles ModSecurity custom (version corrigée)
# CORRECTIONS :
#   WAF-001 : pattern UNION élargi (encodages URL + espaces variables)
#   WAF-002 : inspection body JSON corrigée (pattern exact apostrophe+commentaire)
#   WAF-003 : null byte — ajout pattern %2500 encodé double
#   WAF-004 : whitelist pour reviews légitimes (exclusion faux positifs)
#   WAF-005 : time-based SQLi — ajout ARGS_NAMES en plus de ARGS

SecRuleEngine On
SecRequestBodyAccess On
SecResponseBodyAccess Off
SecRequestBodyLimit 1048576

# ─── WAF-001 : SQLi UNION sur /rest/products/search ──────────────────────────
# Correction : pattern regex élargi pour couvrir UNION%20SELECT et variantes
SecRule REQUEST_URI "@beginsWith /rest/products/search" \
    "chain,id:1001,phase:2,deny,status:403,\
    log,auditlog,\
    msg:'WAF-001 SQLi UNION detected on search endpoint',\
    tag:'attack-sqli',tag:'OWASP_CRS/WEB_ATTACK/SQL_INJECTION'"
    SecRule ARGS:q "@rx (?i)(\bunion\b[\s%+]+\bselect\b|sqlite_master|information_schema|'\s*--|\)\s*--|xp_cmdshell|randomblob)"

# ─── WAF-002 : SQLi Login Bypass ──────────────────────────────────────────────
# Correction : pattern plus précis — apostrophe SUIVIE de -- ou OR/AND
# Évite de bloquer les mots de passe avec apostrophes légitimes
SecRule REQUEST_URI "@beginsWith /rest/user/login" \
    "chain,id:1002,phase:2,deny,status:403,\
    log,auditlog,\
    msg:'WAF-002 SQLi login bypass detected',\
    tag:'attack-sqli'"
    SecRule REQUEST_BODY "@rx (?i)('[\s]*--|'[\s]*or[\s]+'|'[\s]*and[\s]+'|;\s*--|\bor\b\s+1\s*=\s*1)"

# ─── WAF-003 : Null Byte Bypass sur /ftp/ ─────────────────────────────────────
# Correction : ajout du pattern %2500 (double encodage URL du null byte)
SecRule REQUEST_URI "@beginsWith /ftp/" \
    "chain,id:1003,phase:1,deny,status:400,\
    log,auditlog,\
    msg:'WAF-003 Null byte detected in FTP URI',\
    tag:'attack-lfi'"
    SecRule REQUEST_URI "@rx (%00|%2500|%25[0-9a-fA-F]{2}00|\\x00)"

# ─── WAF-004 : XSS Stocké sur les reviews ─────────────────────────────────────
# Correction : whitelist pour content type application/json avec message légitime
# Seuls les patterns XSS réels sont bloqués ; le texte ordinaire passe

# Règle principale — bloquer XSS évidents
SecRule REQUEST_URI "@rx ^/rest/products/[0-9]+/reviews$" \
    "chain,id:1004,phase:2,deny,status:403,\
    log,auditlog,\
    msg:'WAF-004 Stored XSS attempt in product reviews',\
    tag:'attack-xss'"
    SecRule REQUEST_BODY "@rx (?i)(<script[\s>\/]|javascript\s*:|<iframe[\s>]|<img[^>]+\bonerror\b|document\.cookie|localStorage\.(get|set)|eval\s*\(|fetch\s*\(\s*['\"]http)"

# Règle complémentaire — bloquer les attributs événement HTML inline (onerror, onload...)
SecRule REQUEST_URI "@rx ^/rest/products/[0-9]+/reviews$" \
    "chain,id:1040,phase:2,deny,status:403,\
    log,auditlog,\
    msg:'WAF-004b HTML event handler in review body',\
    tag:'attack-xss'"
    SecRule REQUEST_BODY "@rx (?i)\bon(error|load|click|mouseover|focus|blur|input|change|submit)\s*="

# ─── WAF-005 : Time-based SQLi (RANDOMBLOB, sleep) ────────────────────────────
# Correction : inspection sur ARGS ET REQUEST_URI (payload peut être dans l'URL)
SecRule ARGS|REQUEST_URI "@rx (?i)(RANDOMBLOB|randomblob|sqlite_version\s*\(|sleep\s*\(\s*\d|waitfor\s+delay|benchmark\s*\()" \
    "id:1005,phase:2,deny,status:403,\
    log,auditlog,\
    msg:'WAF-005 Time-based SQLi detected',\
    tag:'attack-sqli'"

# ─── WAF-006 : Path Traversal général ────────────────────────────────────────
SecRule REQUEST_URI "@rx (\.\./|\.\.\\|%2e%2e%2f|%2e%2e/)" \
    "id:1006,phase:1,deny,status:403,\
    log,auditlog,\
    msg:'WAF-006 Path traversal attempt',\
    tag:'attack-lfi'"

# ─── WAF-007 : Log des tentatives de login pour SIEM ─────────────────────────
SecRule REQUEST_URI "@beginsWith /rest/user/login" \
    "id:1007,phase:5,pass,\
    log,auditlog,\
    msg:'WAF-007 Login attempt — logged for SIEM correlation',\
    tag:'auth-attempt'"

# ─── WAF-008 : Monitoring IDOR — log accès profils/paniers ───────────────────
SecRule REQUEST_URI "@rx ^/api/Users/[0-9]+" \
    "id:1008,phase:1,pass,\
    log,auditlog,\
    msg:'WAF-008 User profile access — IDOR monitoring',\
    tag:'idor-monitor'"

SecRule REQUEST_URI "@rx ^/rest/basket/[0-9]+" \
    "id:1009,phase:1,pass,\
    log,auditlog,\
    msg:'WAF-009 Basket access — IDOR monitoring',\
    tag:'idor-monitor'"

# ─── Désactivation règles CRS trop agressives sur Juice Shop ─────────────────
# Évite les faux positifs sur les routes Angular (SPA) et les apostrophes légitimes
SecRuleRemoveById 942100   # SQLi via libinjection — trop de faux positifs sur SPA
SecRuleRemoveById 942200   # SQLi comments — apostrophe dans champ de recherche
SecRuleRemoveById 942370   # SQLi apostrophe + commentaire — géré par WAF-001/002
SecRuleRemoveById 920230   # Multiple Accept headers — Juice Shop SPA
SecRuleRemoveById 921180   # HTTP parameter pollution — Angular routing
